name: Deploy to Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Skip until Vercel token is configured
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "::notice::VERCEL_TOKEN secret is not configured yet. Add it, then rerun this workflow."

      - name: Checkout
        if: env.VERCEL_TOKEN != ''
        uses: actions/checkout@v4

      - name: Setup Node
        if: env.VERCEL_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: npm install --global vercel@latest

      - name: Link Vercel project
        if: env.VERCEL_TOKEN != ''
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy production
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
